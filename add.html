<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Plant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class= "add-plant-theme" onload="updateForm()"> <div class="main-card">
        <h2>Add New Plant</h2>
        <form onsubmit="addPlant(event)">
            <input type="text" id="pName" placeholder="Plant Nickname" required>
            
            <select id="pSpecies" onchange="updateForm()">
                <option value="Rose">Rose</option>
                <option value="Mango">Mango</option>
                <option value="Neem">Neem</option>
                <option value="Jackfruit">Jackfruit</option>
                <option value="Coconut">Coconut</option>
                <option value="Hibiscus">Hibiscus</option>
                <option value="Snake Plant">Snake Plant</option>
                <option value="Aloe Vera">Aloe Vera</option>
                <option value="Monstera">Monstera</option>
                <option value="Sunflower">Sunflower</option>
                <option value="Cactus">Cactus</option>
                <option value="Tulsi">Tulsi</option>
                <option value="Manual">Manual</option>
            </select>

            <div id="manualFields" style="display:none;">
                <input type="text" id="mSpecies" placeholder="Enter Species Name">
                <input type="text" id="mVariety" placeholder="Enter Variety Name">
            </div>

            <select id="pVariety"></select>
            
            <input type="text" id="pQuality" placeholder="Quality" readonly>
            <input type="text" id="pBenefit" placeholder="Benefit" readonly>
        
            <button type="submit">Add to Jungle</button>
        </form>
        <a href="index.html"><button>Back</button></a>
    </div>

    <script src="app.js"></script>
</body>
</html>
