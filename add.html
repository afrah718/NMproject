<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-card">
        <h2>New Growth</h2>
        <p style="margin-bottom: 30px;">Give your plant a name and personality.</p>

        <form onsubmit="addPlant(event)">
            <div class="form-group">
                <label>NICKNAME</label>
                <input type="text" id="pName" placeholder="e.g. Sunny" required>
            </div>

            <div class="form-group">
                <label>SPECIES</label>
                <select id="pSpecies">
                    <option>Monstera 🍀</option>
                    <option>Cactus 🌵</option>
                    <option>Snake Plant 🐍</option>
                </select>
            </div>

            <button type="submit" class="btn-grow">Start Growing</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
